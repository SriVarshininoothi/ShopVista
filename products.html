<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopVista - Products</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="./css/navbar.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/footer.css">
    <link rel="stylesheet" href="./css/hero.css">
    <link rel="stylesheet" href="./css/product.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar" data-bs-theme="dark">
        <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand" href="./index.html">
                <i class="bi bi-bag-heart-fill" style="color: yellow;"></i> ShopVista
            </a>

            <!-- Mobile Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>
            </button>


            <!-- Navigation Links -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto gap-3">

                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./index.html">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="./products.html">
                            Products
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="./about.html">
                            About Us
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="./contact.html">
                            Contact
                        </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <!-- hero card -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="contactus">All Products</h1>
            <h5 class="love">Browse our full collection</h5>
        </div>
    </section>
    <!-- search card -->
    <section class="search py-5">
        <div class="container">


            <form class="searchbar">

                <div class="searchicon">
                    <i class="bi bi-search"></i>
                </div>

                <input type="search" id="searchproduct" class="form-control" placeholder="Search products...">

                <select class="form-select category" id="searchcategory">
                    <option>All Categories</option>
                    <option>Beauty</option>
                    <option>Sunglasses</option>
                    <option>Fragrances</option>
                    <option>Furniture</option>
                    <option>Groceries</option>
                    <option>Home Decoration</option>
                    <option>Laptop</option>
                    <option>Smartphones</option>
                    <option>Men's Shirts</option>
                    <option>Men's Shoes</option>
                    <option>Men's Watches</option>
                    <option>Home Accessories</option>
                    <option>Kitchen Accessories</option>
                    <option>Skin Care</option>
                    <option>Motorcycle</option>
                    <option>Tablets</option>
                    <option>Sports Accessories</option>
                    <option>Vehicle</option>
                    <option>Women's Bags</option>
                    <option>Women's Dresses</option>
                    <option>Women's Shoes</option>
                    <option>Women's Watches</option>
                    <option>Women's Jewellery</option>
                    <option>Tops</option>
                </select>

                <select class="form-select sort" id="sort">
                    <option>Sort By</option>
                    <option>Price: Low → High</option>
                    <option>Price: High → Low</option>
                    <option>Top Rated</option>
                </select>

            </form>

        </div>
    </section>

    <!-- Product List -->

    <section class="main py-5">

        <div class="countProduct" id="productFound">

        </div>

        <div class="container py-5">

            <div class="row g-4" id="productsContainer">

            </div>

        </div>
      
    </section>






    <script src="./js/products.js"></script>
   


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
